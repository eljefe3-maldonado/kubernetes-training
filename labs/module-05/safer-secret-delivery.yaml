# SAFER SECRET DELIVERY — reference solution for leaky-deployment.yaml
#
# Addresses all seven leak vectors. Comments reference the original issue numbers.

---
apiVersion: v1
kind: Secret
metadata:
  name: db-credentials
  namespace: secrets-lab
type: Opaque
data:
  password: c3VwM3ItczNjcjN0LXBAc3N3MHJk
  username: YWRtaW4=
# The secret content itself is unchanged here. The improvement is in how it is
# delivered and who can access it. To fully address etcd exposure, enable
# encryption at rest with an external KMS key at the cluster level.

---
# FIX for ISSUE 1 and 2: scope RBAC to get on one named secret only.
# No list (cannot enumerate secrets), no watch (cannot stream future changes).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: safer-app
  namespace: secrets-lab
automountServiceAccountToken: false   # FIX for ISSUE 3
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: safer-app-role
  namespace: secrets-lab
rules:
- apiGroups: [""]
  resources: ["secrets"]
  resourceNames: ["db-credentials"]   # named secret only
  verbs: ["get"]                       # get only — no list, no watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: safer-app-binding
  namespace: secrets-lab
subjects:
- kind: ServiceAccount
  name: safer-app
  namespace: secrets-lab
roleRef:
  kind: Role
  name: safer-app-role
  apiGroup: rbac.authorization.k8s.io

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: safer-app
  namespace: secrets-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: safer-app
  template:
    metadata:
      labels:
        app: safer-app
    spec:
      serviceAccountName: safer-app
      automountServiceAccountToken: false   # belt-and-suspenders with SA setting above

      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault

      containers:
      - name: app
        image: busybox:1.36
        command: ["sh", "-c"]
        args:
        # FIX for ISSUE 4: read the secret from the file, do not log it.
        # The application reads the password at connection time, not at startup,
        # and never prints it to stdout or stderr.
        - |
          DB_PASSWORD=$(cat /etc/secrets/password)
          echo "Starting application — connecting to database"
          sleep 3600

        # FIX for ISSUE 5 and 6: no secret values in env vars or literals.
        # Only non-sensitive configuration is passed as env.
        env:
        - name: DB_HOST
          value: "postgres.data.svc.cluster.local"
        - name: DB_USERNAME_FILE
          value: "/etc/secrets/username"
        - name: DB_PASSWORD_FILE
          value: "/etc/secrets/password"

        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL

        resources:
          requests:
            cpu: 100m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi

        volumeMounts:
        # FIX for ISSUE 7: mount with 0400 (owner read-only, no group or world access).
        # The container runs as UID 1000; fsGroup 1000 ensures the mounted files
        # are owned by GID 1000 and readable by the container process.
        - name: db-secret-volume
          mountPath: /etc/secrets
          readOnly: true
        - name: tmp
          mountPath: /tmp

      volumes:
      - name: db-secret-volume
        secret:
          secretName: db-credentials
          defaultMode: 0400   # owner read-only — no group or world read
      - name: tmp
        emptyDir: {}
