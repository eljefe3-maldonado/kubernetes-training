# INTENTIONALLY LEAKY — FOR LAB USE ONLY
#
# This workload exposes secret material through at least seven distinct vectors.
# Find them all before opening safer-secret-delivery.yaml.

---
# The secret itself — base64-encoded value is not encryption.
# echo -n 'sup3r-s3cr3t-p@ssw0rd' | base64
apiVersion: v1
kind: Secret
metadata:
  name: db-credentials
  namespace: secrets-lab
type: Opaque
data:
  password: c3VwM3ItczNjcjN0LXBAc3N3MHJk
  username: YWRtaW4=

---
# ISSUE 1: Service account with excessive secret access.
# list + watch means any token for this SA can stream all secret updates
# in the namespace in real time, including future secrets.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: leaky-app
  namespace: secrets-lab
# automountServiceAccountToken defaults to true — the token is always mounted
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: leaky-app-role
  namespace: secrets-lab
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list", "watch"]   # ISSUE 2: list and watch are unnecessary
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: leaky-app-binding
  namespace: secrets-lab
subjects:
- kind: ServiceAccount
  name: leaky-app
  namespace: secrets-lab
roleRef:
  kind: Role
  name: leaky-app-role
  apiGroup: rbac.authorization.k8s.io

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: leaky-app
  namespace: secrets-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: leaky-app
  template:
    metadata:
      labels:
        app: leaky-app
    spec:
      serviceAccountName: leaky-app

      # ISSUE 3: automountServiceAccountToken not disabled.
      # The service account token is mounted at /var/run/secrets/kubernetes.io/serviceaccount/token
      # and can be used to list/watch secrets via the API server.

      containers:
      - name: app
        image: busybox:1.36
        command: ["sh", "-c"]
        args:
        # ISSUE 4: the entrypoint logs the secret value to stdout at startup.
        # Container logs are stored on the node and may be forwarded to a log
        # aggregator where they are indexed and searchable indefinitely.
        - |
          echo "Connecting to database with password: $DB_PASSWORD"
          sleep 3600

        env:
        # ISSUE 5: secret delivered as an environment variable.
        # Env vars are visible in:
        #   kubectl describe pod (shown in the Events and container spec)
        #   /proc/<pid>/environ on the node (readable by root or privileged processes)
        #   any crash dump or core file the application generates
        #   tracing tools that inspect process memory
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: password
        - name: DB_USERNAME
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: username

        # ISSUE 6: secret also stored directly in the Deployment spec as plaintext.
        # Anyone with get/list on Deployments can read this, even without Secret access.
        - name: DB_HOST
          value: "postgres.data.svc.cluster.local"
        - name: APP_SECRET_KEY
          value: "hardcoded-secret-do-not-do-this"   # hardcoded literal

        volumeMounts:
        # ISSUE 7: secret mounted with default permissions (0644 = world-readable).
        # Any process running as the same or lower UID can read the file.
        - name: db-secret-volume
          mountPath: /etc/secrets

      volumes:
      - name: db-secret-volume
        secret:
          secretName: db-credentials
          # defaultMode not set — defaults to 0644 (owner read/write, group+world read)
